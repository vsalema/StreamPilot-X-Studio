<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="240" height="240"><svg width="240" height="240" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Halo animé -->
  <circle cx="180" cy="260" r="140" fill="none" stroke="#00baff" stroke-width="28">
    <animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"></animate>
    <animate attributeName="r" values="130;145;130" dur="3s" repeatCount="indefinite"></animate>
  </circle>

  <!-- Pin marker -->
  <path d="M180,130            C115,130 70,175 70,240            C70,320 180,450 180,450            C180,450 290,320 290,240            C290,175 245,130 180,130Z" fill="#00a8f5" opacity="0.95">
    <animate attributeName="opacity" values="0.95;1;0.95" dur="4s" repeatCount="indefinite"></animate>
  </path>

  <!-- Play triangle -->
  <polygon points="155,205 155,315 245,260" fill="white">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"></animate>
  </polygon>

  <!-- STREAM PILOT X texte -->
  <text x="330" y="235" font-size="70" font-family="Segoe UI, sans-serif" fill="white" opacity="0.9">
    Stream
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3.5s" repeatCount="indefinite"></animate>
  </text>

  <text x="330" y="315" font-size="70" font-family="Segoe UI, sans-serif" fill="white" opacity="0.9">
    Pilot
  </text>

  <!-- Le "X" bleu dynamique -->
  <text x="485" y="315" font-size="90" font-family="Segoe UI, sans-serif" fill="#00baff">
    X
    <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"></animate>
    <animate attributeName="letter-spacing" values="0;4;0" dur="2.8s" repeatCount="indefinite"></animate>
  </text>

</svg><style>@media (prefers-color-scheme: light) { :root { filter: none; } }
@media (prefers-color-scheme: dark) { :root { filter: none; } }
</style></svg>