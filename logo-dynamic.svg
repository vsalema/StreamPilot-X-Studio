<svg width="256" height="64" viewBox="0 0 640 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StreamPilot X">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(40,20)">
    <circle cx="48" cy="58" r="44" fill="#00baff" opacity=".2">
      <animate attributeName="r" values="44;49;44" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;.35;.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <path d="M48,0 C21,0 0,21 0,48 c0,33 48,92 48,92 s48-59 48-92 C96,21 75,0 48,0Z" fill="#00a8f5" filter="url(#glow)"/>
    <polygon points="38,30 38,66 68,48" fill="#fff" opacity=".95">
      <animate attributeName="opacity" values=".7;.95;.7" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="700">
    <text x="150" y="70" font-size="58" fill="#e6e8ef" opacity=".95">
      Stream
      <animate attributeName="opacity" values=".8;.95;.8" dur="3.2s" repeatCount="indefinite"/>
    </text>
    <text x="150" y="130" font-size="58" fill="#e6e8ef" opacity=".95">Pilot</text>
    <text x="360" y="130" font-size="74" fill="#00baff">
      X
      <animate attributeName="fill-opacity" values=".4;1;.4" dur="2.6s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
